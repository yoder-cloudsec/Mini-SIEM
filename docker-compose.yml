version: "3.8"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=changeme
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:changeme -s http://localhost:9200/_security/_authenticate || exit 1"]
      interval: 10s
      retries: 10

  kibana-setup:
    image: curlimages/curl:latest
    container_name: kibana-setup
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: on-failure
    command: >
      curl -s -u elastic:changeme
      -X POST http://elasticsearch:9200/_security/user/kibana_system/_password
      -H "Content-Type: application/json"
      -d '{"password":"changeme"}'

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=changeme
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana-setup:
        condition: service_completed_successfully

volumes:
  esdata:
